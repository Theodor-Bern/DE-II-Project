services:
  producer:
    image: theodorafc02/de-2-producer:latest
    container_name: producer
    env_file:
      - /home/ubuntu/.broker_env
      - /home/ubuntu/.github_tokens
    environment:
      DAYS_BACK: "7"
      TOPIC: "repos.raw"
    # Default CMD in the image runs producer.py — no override needed.
    # Producer runs once over the date range, then exits. Don't auto-restart.
    restart: "no"
